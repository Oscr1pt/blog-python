{{ define "main" }}
<div class="contributors-page">
  <div class="contributors-header text-center my-5">
    <h1 class="contributors-title">CONTRIBUTORS<span class="cursor"></span></h1>
    <p class="contributors-subtitle">Los responsables de que este proyecto sea posible</p>
  </div>

  <div class="container pb-5">
    <div class="row justify-content-center gx-4 gy-4">
      {{ range .RegularPages }}
      <div class="col-md-6 col-lg-5 d-flex">
        <div class="contributor-card w-100 p-4 d-flex align-items-center">
          <div class="contributor-avatar me-4">
            <img src="https://github.com/{{ .Params.github }}.png" alt="{{ .Title }}" class="rounded-circle">
          </div>
          <div class="contributor-info flex-grow-1">
            <h3 class="contributor-name m-0">{{ .Title }}</h3>
            <p class="contributor-role mb-3">{{ .Params.role }}</p>


            <div class="contributor-links">
              {{ if .Params.github }}
              <a href="https://github.com/{{ .Params.github }}" class="me-2 text-decoration-none" target="_blank" rel="noopener">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path
                    d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
                  </path>
                </svg>
              </a>
              {{ end }}
              {{ if .Params.website }}
              <a href="{{ .Params.website }}" class="text-decoration-none" target="_blank" rel="noopener">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="2" y1="12" x2="22" y2="12"></line>
                  <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                  </path>
                </svg>
              </a>
              {{ end }}
            </div>
          </div>
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</div>
{{ end }}
